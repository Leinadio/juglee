<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="24" height="24"><path fill="#2e7d32" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        <h1>YouTube Watched</h1>
      </div>
    </div>

    <div class="stats">
      <div class="stat-item">
        <span class="stat-number" id="totalCount">0</span>
        <span class="stat-label">vidéos vues</span>
      </div>
    </div>

    <div class="section">
      <h2>Dernières vidéos marquées</h2>
      <ul id="recentList" class="recent-list">
        <li class="empty-state">Aucune vidéo marquée</li>
      </ul>
    </div>

    <div class="actions">
      <button id="exportBtn" class="btn btn-secondary">Exporter</button>
      <button id="clearBtn" class="btn btn-danger">Tout effacer</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
