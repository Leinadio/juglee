<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <defs>
            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#fc4e4e"/>
              <stop offset="100%" stop-color="#d0a0ff"/>
            </linearGradient>
          </defs>
          <path fill="url(#logoGrad)" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
        </svg>
        <h1>YouTube Watched</h1>
      </div>
      <div class="lang-toggle">
        <button id="langFr" class="lang-btn active">FR</button>
        <button id="langEn" class="lang-btn">EN</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-item">
        <span class="stat-number" id="totalCount">0</span>
        <span class="stat-label" data-i18n="videosWatched">vidéos vues</span>
      </div>
    </div>

    <div class="section">
      <h2 data-i18n="recentTitle">Dernières vidéos marquées</h2>
      <ul id="recentList" class="recent-list">
        <li class="empty-state" data-i18n="emptyState">Aucune vidéo marquée</li>
      </ul>
    </div>

    <div class="actions">
      <button id="exportBtn" class="btn btn-secondary" data-i18n="export">Exporter</button>
      <button id="importBtn" class="btn btn-secondary" data-i18n="import">Importer</button>
      <button id="clearBtn" class="btn btn-danger" data-i18n="clearAll">Tout effacer</button>
      <input type="file" id="importFile" accept=".json" hidden>
    </div>
  </div>
  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
